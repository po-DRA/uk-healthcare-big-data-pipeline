name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Lint, type-check, test, and validate notebooks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      # ---------------------------------------------------------------
      # Code quality
      # ---------------------------------------------------------------

      - name: Lint with ruff
        run: uv run ruff check src/ flows/

      - name: Format check with ruff
        run: uv run ruff format --check src/ flows/

      - name: Type-check with mypy
        run: uv run mypy src/

      # ---------------------------------------------------------------
      # Notebook validation
      # Marimo notebooks are pure Python.
      # py_compile catches broken syntax; ruff catches style issues.
      # ---------------------------------------------------------------

      - name: Validate notebook syntax
        run: uv run python -m py_compile notebooks/*.py

      - name: Lint notebooks with ruff
        run: uv run ruff check notebooks/

      # ---------------------------------------------------------------
      # Tests with coverage
      # ---------------------------------------------------------------

      - name: Run unit tests with coverage (exclude slow live-API tests)
        run: uv run pytest tests/ -v -m "not slow"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

      # ---------------------------------------------------------------
      # Docker build validation
      # Catches broken Dockerfiles before they reach production.
      # ---------------------------------------------------------------

      - name: Build Docker image
        run: docker build -t uk-healthcare-pipeline:ci .
