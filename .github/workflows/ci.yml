name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check src/ flows/

      - name: Format check with ruff
        run: uv run ruff format --check src/ flows/

      - name: Type-check with mypy
        run: uv run mypy src/

      - name: Run unit tests (exclude slow live-API tests)
        run: uv run pytest tests/ -v -m "not slow"
